<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Seller Dashboard - Kilimo Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f0; color: #1e2a1e; padding-bottom: 80px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 16px 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: white; padding: 12px 20px; border-radius: 28px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo i { font-size: 24px; color: #2c6e2c; }
        .logo h1 { font-size: 1.3rem; color: #1b4d1b; }
        .seller-badge { background: #eaf7ea; padding: 5px 12px; border-radius: 40px; font-size: 0.75rem; color: #2c6e2c; }
        .seller-name { font-weight: 600; background: #f5f5f5; padding: 5px 12px; border-radius: 40px; font-size: 0.85rem; }
        .btn-logout { background: #dc2626; border: none; color: white; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; }
        .welcome-banner { background: linear-gradient(135deg, #1f4f1f, #2e7d32); border-radius: 24px; padding: 16px 20px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .welcome-banner h2 { font-size: 1.2rem; margin-bottom: 4px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 20px; padding: 14px 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-icon i { font-size: 1.6rem; color: #2c6e2c; }
        .stat-value { font-size: 1.4rem; font-weight: 800; }
        .stat-label { font-size: 0.7rem; color: #5a6e5a; }
        @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .btn-primary { background: #2c6e2c; color: white; border: none; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 16px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .product-image { width: 100%; height: 180px; object-fit: cover; }
        .product-info { padding: 12px; }
        .product-title { font-weight: 700; font-size: 1rem; margin-bottom: 5px; }
        .product-price { color: #2c6e2c; font-weight: 700; margin: 4px 0; }
        .product-location { font-size: 12px; color: #666; display: flex; align-items: center; gap: 4px; margin: 5px 0; }
        .product-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-edit, .btn-delete { padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-edit { background: #e0e8e0; color: #2c6e2c; }
        .btn-delete { background: #ffe0e0; color: #dc2626; }
        .empty-state { text-align: center; padding: 40px; color: #6e8b6e; }
        .image-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 20px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
            border-top: 1px solid rgba(46, 125, 50, 0.1);
            z-index: 200;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.3s ease;
            cursor: pointer;
            flex: 1;
            max-width: 80px;
        }
        .nav-item i { font-size: 1.4rem; color: #9aa89a; }
        .nav-item span { font-size: 0.7rem; font-weight: 500; color: #9aa89a; }
        .nav-item.active { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
        .nav-item.active i { color: #2e7d32; transform: scale(1.1); }
        .nav-item.active span { color: #2e7d32; font-weight: 700; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; color: #1e3a1e; }
        input, select, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e2ede2; border-radius: 24px; font-family: inherit; }
        .search-filter-group { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-filter-group input { flex: 1; }
        .search-filter-group select { width: auto; min-width: 100px; }
        .btn-success { background: #2c6e2c; color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        .btn-cancel { background: #f0f0f0; color: #333; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 8px; }
        .icon-large { font-size: 4rem; margin-bottom: 15px; }
        .text-warning { color: #f59e0b; }
        .toast-notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a1e;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1100;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="mobile-bottom-nav">
        <div class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" data-tab="account"><i class="fas fa-user-circle"></i><span>Account</span></div>
        <div class="nav-item" data-tab="resources"><i class="fas fa-book-open"></i><span>Resources</span></div>
        <div class="nav-item" data-tab="help"><i class="fas fa-question-circle"></i><span>Help</span></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo" onclick="window.location.href='index.html'"><i class="fas fa-seedling"></i><h1>Kilimo Tech</h1></div>
            <div class="seller-info">
                <span class="seller-badge"><i class="fas fa-store"></i> Seller</span>
                <span id="sellerName" class="seller-name">Loading...</span>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="welcome-banner">
            <div><h2>Welcome, <span id="welcomeName">Seller</span>!</h2><p>Manage your products and grow your business</p></div>
            <div><i class="fas fa-chart-line" style="font-size: 2rem; opacity: 0.8;"></i></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div><div class="stat-value" id="totalProducts">0</div><div class="stat-label">Products</div></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-eye"></i></div><div><div class="stat-value" id="totalViews">0</div><div class="stat-label">Views</div></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-phone"></i></div><div><div class="stat-value" id="totalContacts">0</div><div class="stat-label">Contacts</div></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div><div><div class="stat-value" id="totalEarnings">0</div><div class="stat-label">Earnings (KSH)</div></div></div>
        </div>

        <div class="section-header">
            <h2><i class="fas fa-list"></i> My Products</h2>
            <button class="btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Product</button>
        </div>

        <div class="search-filter-group">
            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
            <select id="statusFilter" onchange="filterProducts()">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="sold">Sold</option>
            </select>
        </div>

        <div id="productsGrid" class="products-grid"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
    </div>

    <!-- Add Product Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Add New Product</h2>
            <form id="addForm" onsubmit="submitAddProduct(event)">
                <div class="form-group"><label>Title *</label><input type="text" id="prodTitle" placeholder="Product title" required></div>
                <div class="form-group"><label>Category *</label><select id="prodCategory" required><option value="">Select</option><option value="food">Food</option><option value="farming">Farming</option><option value="electronics">Electronics</option><option value="animals">Animals</option></select></div>
                <div class="form-group"><label>Price (KSH) *</label><input type="number" id="prodPrice" placeholder="e.g., 1500" required></div>
                <div class="form-group"><label>Location *</label><input type="text" id="prodLocation" placeholder="e.g., Nairobi" required></div>
                <div class="form-group"><label>Description *</label><textarea id="prodDescription" rows="3" placeholder="Describe your product..." required></textarea></div>
                <div class="form-group"><label>Images (Max 4)</label><input type="file" id="prodImages" accept="image/*" multiple onchange="previewImages(this)"></div>
                <div id="imagePreview" class="image-preview"></div>
                <button type="submit" class="btn-success">Post Product</button>
                <button type="button" class="btn-cancel" onclick="closeAddModal()">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Edit Product</h2>
            <form id="editForm" onsubmit="submitEdit(event)">
                <input type="hidden" id="editId">
                <div class="form-group"><label>Title</label><input type="text" id="editTitle" required></div>
                <div class="form-group"><label>Description</label><textarea id="editDescription" rows="3" required></textarea></div>
                <div class="form-group"><label>Price (KSH)</label><input type="number" id="editPrice" required></div>
                <div class="form-group"><label>Location</label><input type="text" id="editLocation" required></div>
                <div class="form-group"><label>Status</label><select id="editStatus"><option value="active">Active</option><option value="sold">Sold</option></select></div>
                <button type="submit" class="btn-success">Save Changes</button>
                <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <i class="fas fa-exclamation-triangle icon-large text-warning"></i>
            <h3>Delete Product?</h3>
            <p>This action cannot be undone!</p>
            <button class="btn-success" onclick="confirmDelete()" style="background:#dc2626;">Yes, Delete</button>
            <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>

    <!-- Toast Modal -->
    <div id="toastModal" class="modal">
        <div class="modal-content" style="max-width: 350px; text-align: center; background: #1e3a1e; color: white;">
            <i class="fas fa-check-circle" style="font-size: 3rem; margin-bottom: 10px;"></i>
            <p id="toastMessage" style="font-size: 1rem;">Success!</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentUser = null;
        let authToken = null;
        let products = [];
        let editId = null;
        let deleteId = null;
        let selectedFiles = [];

        function showToast(message, isError = false) {
            const toast = document.getElementById('toastModal');
            const toastMsg = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            toastMsg.innerText = message;
            if (isError) {
                icon.className = 'fas fa-exclamation-circle';
                icon.style.color = '#f59e0b';
                toast.querySelector('.modal-content').style.background = '#dc2626';
            } else {
                icon.className = 'fas fa-check-circle';
                icon.style.color = '#4caf50';
                toast.querySelector('.modal-content').style.background = '#1e3a1e';
            }
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        async function loadData() {
            const token = localStorage.getItem('kilimo_token');
            if (!token) { 
                window.location.replace('index.html'); 
                return; 
            }
            
            try {
                const response = await fetch(API_BASE + '/verify', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.valid && data.user.role === 'seller') {
                    currentUser = data.user;
                    authToken = token;
                    document.getElementById('sellerName').innerText = currentUser.username;
                    document.getElementById('welcomeName').innerText = currentUser.username.split(' ')[0];
                    loadSellerProducts();
                } else {
                    localStorage.removeItem('kilimo_token');
                    window.location.replace('index.html');
                }
            } catch (error) {
                console.error('Auth error:', error);
                showToast('Connection error. Make sure server is running.', true);
            }
        }

        async function loadSellerProducts() {
            try {
                const response = await fetch(API_BASE + '/my-products', {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                products = await response.json();
                renderProducts();
                updateStats();
            } catch (error) {
                console.error('Error loading products:', error);
                showToast('Error loading products', true);
            }
        }

        function updateStats() {
            document.getElementById('totalProducts').innerText = products.length;
            const totalViews = products.reduce((s, p) => s + (p.views || 0), 0);
            document.getElementById('totalViews').innerText = totalViews;
            document.getElementById('totalEarnings').innerText = products.length * 20;
            document.getElementById('totalContacts').innerText = products.length;
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return 'https://placehold.co/300x200/2e7d32/white?text=No+Image';
            if (imagePath.startsWith('http')) return imagePath;
            if (imagePath.startsWith('/uploads/')) return 'http://localhost:3000' + imagePath;
            if (imagePath.startsWith('data:image')) return imagePath;
            return 'https://placehold.co/300x200/2e7d32/white?text=Product';
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('statusFilter')?.value || 'all';
            
            let filtered = products.filter(p => p.title.toLowerCase().includes(searchTerm) || p.description.toLowerCase().includes(searchTerm));
            if (statusFilter !== 'all') filtered = filtered.filter(p => p.status === statusFilter);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>No products found</p><button class="btn-primary" onclick="openAddModal()" style="margin-top:10px;">Add Your First Product</button></div>';
                return;
            }
            
            grid.innerHTML = filtered.map(p => {
                let images = [];
                try { images = JSON.parse(p.images || '[]'); } catch(e) {}
                const mainImage = images.length > 0 ? getImageUrl(images[0]) : 'https://placehold.co/300x200/2e7d32/white?text=Product';
                
                return `
                    <div class="product-card">
                        <img src="${mainImage}" class="product-image" onerror="this.src='https://placehold.co/300x200/2e7d32/white?text=Product'">
                        <div class="product-info">
                            <div class="product-title">${escapeHtml(p.title)} ${p.status === 'sold' ? '<span style="background:#fef3c7; color:#b45309; font-size:0.7rem; padding:2px 8px; border-radius:12px; margin-left:6px;">SOLD</span>' : ''}</div>
                            <div class="product-price">KSH ${p.price.toLocaleString()}</div>
                            <div class="product-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(p.location)}</div>
                            <div><small><i class="fas fa-eye"></i> ${p.views || 0} views</small></div>
                            <div class="product-actions">
                                <button class="btn-edit" onclick="openEditModal(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn-delete" onclick="openDeleteModal(${p.id})"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function searchProducts() { renderProducts(); }
        function filterProducts() { renderProducts(); }

        function previewImages(input) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            selectedFiles = Array.from(input.files);
            if (selectedFiles.length > 4) { showToast('Maximum 4 images allowed', true); selectedFiles = selectedFiles.slice(0, 4); }
            selectedFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        async function submitAddProduct(e) {
            e.preventDefault();
            const title = document.getElementById('prodTitle').value.trim();
            const category = document.getElementById('prodCategory').value;
            const price = parseFloat(document.getElementById('prodPrice').value);
            const location = document.getElementById('prodLocation').value.trim();
            const description = document.getElementById('prodDescription').value.trim();
            
            if (!title || !category || !price || !location || !description) { showToast('Please fill all fields', true); return; }
            if (selectedFiles.length === 0) { showToast('Please upload at least 1 image', true); return; }
            
            const formData = new FormData();
            formData.append('title', title);
            formData.append('category', category);
            formData.append('price', price);
            formData.append('location', location);
            formData.append('description', description);
            for (let i = 0; i < selectedFiles.length; i++) {
                formData.append('images', selectedFiles[i]);
            }
            
            try {
                const response = await fetch(API_BASE + '/products', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + authToken },
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    showToast('Product added successfully!');
                    closeAddModal();
                    resetAddForm();
                    loadSellerProducts();
                } else {
                    showToast(result.error || 'Failed to add product', true);
                }
            } catch (error) {
                console.error('Error adding product:', error);
                showToast('Failed to add product', true);
            }
        }

        function resetAddForm() {
            document.getElementById('addForm').reset();
            document.getElementById('imagePreview').innerHTML = '';
            selectedFiles = [];
        }

        function openEditModal(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            editId = id;
            document.getElementById('editId').value = product.id;
            document.getElementById('editTitle').value = product.title;
            document.getElementById('editDescription').value = product.description;
            document.getElementById('editPrice').value = product.price;
            document.getElementById('editLocation').value = product.location;
            document.getElementById('editStatus').value = product.status;
            document.getElementById('editModal').style.display = 'flex';
        }

        async function submitEdit(e) {
            e.preventDefault();
            const updates = {
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDescription').value,
                price: parseFloat(document.getElementById('editPrice').value),
                location: document.getElementById('editLocation').value,
                status: document.getElementById('editStatus').value
            };
            
            try {
                const response = await fetch(API_BASE + '/products/' + editId, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + authToken
                    },
                    body: JSON.stringify(updates)
                });
                
                if (response.ok) {
                    showToast('Product updated successfully!');
                    closeEditModal();
                    loadSellerProducts();
                } else {
                    showToast('Failed to update product', true);
                }
            } catch (error) {
                console.error('Error updating product:', error);
                showToast('Failed to update product', true);
            }
        }

        function openDeleteModal(id) { deleteId = id; document.getElementById('deleteModal').style.display = 'flex'; }
        function closeDeleteModal() { document.getElementById('deleteModal').style.display = 'none'; deleteId = null; }
        
        async function confirmDelete() {
            if (deleteId) {
                try {
                    const response = await fetch(API_BASE + '/products/' + deleteId, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + authToken }
                    });
                    
                    if (response.ok) {
                        showToast('Product deleted successfully');
                        closeDeleteModal();
                        loadSellerProducts();
                    } else {
                        showToast('Failed to delete product', true);
                    }
                } catch (error) {
                    console.error('Error deleting product:', error);
                    showToast('Failed to delete product', true);
                }
                deleteId = null;
            }
        }

        function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; resetAddForm(); }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; editId = null; }

        function showAccountModal() { alert('Account: ' + currentUser.username + '\nEmail: ' + currentUser.email); }
        function showResourcesModal() { alert('Farming Tips\nMarket Prices\nWeather Forecast\nGovernment Programs'); }
        function showHelpModal() { alert('Help: support@kilimotech.com\nPhone: 0700 000 000'); }
        function showLogoutConfirm() { if (confirm('Logout?')) { localStorage.removeItem('kilimo_token'); window.location.replace('index.html'); } }
        function logout() { showLogoutConfirm(); }

        function switchMobileTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const active = document.querySelector(`.nav-item[data-tab="${tab}"]`);
            if (active) active.classList.add('active');
            if (tab === 'account') showAccountModal();
            else if (tab === 'resources') showResourcesModal();
            else if (tab === 'help') showHelpModal();
            else if (tab === 'home') window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.querySelectorAll('.nav-item').forEach(i => i.addEventListener('click', () => switchMobileTab(i.getAttribute('data-tab'))));
        window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
        
        loadData();
    </script>
</body>
</html>
