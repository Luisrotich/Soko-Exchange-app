
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kilimo Tech - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: white; border-radius: 48px; max-width: 450px; width: 100%; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .login-header { background: linear-gradient(135deg, #1f4f1f, #2e7d32); padding: 40px 30px; text-align: center; color: white; }
        .login-header i { font-size: 60px; margin-bottom: 15px; }
        .login-header h1 { font-size: 28px; margin-bottom: 5px; }
        .login-header p { opacity: 0.9; font-size: 14px; }
        .tabs { display: flex; border-bottom: 1px solid #e0e0e0; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; color: #666; }
        .tab-btn.active { color: #2e7d32; border-bottom: 3px solid #2e7d32; }
        .form-container { padding: 30px; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #333; }
        .input-group input, .input-group select { width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 30px; font-size: 14px; transition: 0.2s; }
        .input-group input:focus { outline: none; border-color: #2e7d32; }
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; }
        .btn-login, .btn-register { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-login:hover, .btn-register:hover { background: #1b5e20; transform: scale(1.02); }
        .demo-info { background: #f5f5f5; border-radius: 20px; padding: 15px; margin-top: 20px; font-size: 12px; text-align: center; color: #666; }
        .error-msg { background: #ffebee; color: #c62828; padding: 10px; border-radius: 20px; font-size: 12px; margin-bottom: 15px; display: none; }
        .success-msg { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 20px; font-size: 12px; margin-bottom: 15px; display: none; }
        @media (max-width: 480px) { .login-card { border-radius: 32px; } .login-header { padding: 30px 20px; } .form-container { padding: 20px; } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-seedling"></i>
            <h1>Kilimo Tech</h1>
            <p>Connect with farmers and buyers</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
            <button class="tab-btn" onclick="switchAuthTab('register')">Sign Up</button>
        </div>
        <div class="form-container">
            <div id="loginError" class="error-msg"></div>
            <div id="registerError" class="error-msg"></div>
            <div id="registerSuccess" class="success-msg"></div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email or Phone</label>
                    <input type="text" id="loginIdentifier" placeholder="buyer@example.com or 254722222222" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword')"></i>
                    </div>
                </div>
                <button type="submit" class="btn-login">Login</button>
                <div class="demo-info">
                    <strong>Demo Accounts:</strong><br>
                    Buyer: buyer@example.com / buyer123<br>
                    Seller: seller@example.com / seller123<br>
                    Admin: admin@kilimo.com / admin123
                </div>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="regUsername" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="user@example.com" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Phone (254XXXXXXXXX)</label>
                    <input type="tel" id="regPhone" placeholder="254700000000" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password (min 6 chars)</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword')"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user-tag"></i> I want to</label>
                    <select id="regRole" required>
                        <option value="buyer">Buy Products</option>
                        <option value="seller">Sell Products</option>
                    </select>
                </div>
                <button type="submit" class="btn-register">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId);
            errorDiv.innerText = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('registerSuccess');
            successDiv.innerText = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                // Clear errors when switching
                document.getElementById('loginError').style.display = 'none';
                document.getElementById('registerError').style.display = 'none';
                document.getElementById('registerSuccess').style.display = 'none';
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
                document.getElementById('loginError').style.display = 'none';
                document.getElementById('registerError').style.display = 'none';
                document.getElementById('registerSuccess').style.display = 'none';
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const identifier = document.getElementById('loginIdentifier').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!identifier || !password) {
                showError('loginError', 'Please enter email/phone and password');
                return;
            }
            
            try {
                const response = await fetch(API_BASE + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: identifier, password: password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Store token for API authentication
                    localStorage.setItem('kilimo_token', result.token);
                    // Redirect to user's dashboard
                    window.location.replace(result.user.role + '.html');
                } else {
                    showError('loginError', result.error || 'Invalid email/phone or password');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('loginError', 'Connection error. Make sure the server is running on port 3000');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            
            // Validation
            if (!username || !email || !phone || !password || !role) {
                showError('registerError', 'Please fill in all fields');
                return;
            }
            
            if (!/^254[0-9]{9}$/.test(phone)) {
                showError('registerError', 'Phone must be 254XXXXXXXXX format');
                return;
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('registerError', 'Please enter a valid email address');
                return;
            }
            
            if (password.length < 6) {
                showError('registerError', 'Password must be at least 6 characters');
                return;
            }
            
            try {
                const response = await fetch(API_BASE + '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: username, 
                        email: email, 
                        phone: phone, 
                        password: password, 
                        role: role 
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('Registration successful! Please login.');
                    // Clear form
                    document.getElementById('registerForm').reset();
                    // Switch to login tab after 2 seconds
                    setTimeout(() => {
                        switchAuthTab('login');
                    }, 2000);
                } else {
                    showError('registerError', result.error || 'Registration failed');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('registerError', 'Connection error. Make sure the server is running on port 3000');
            }
        }

        // Check if already logged in
        const token = localStorage.getItem('kilimo_token');
        if (token) {
            // Verify token with server
            fetch(API_BASE + '/verify', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => response.json())
            .then(data => {
                if (data.valid && data.user) {
                    window.location.replace(data.user.role + '.html');
                } else {
                    localStorage.removeItem('kilimo_token');
                }
            })
            .catch(() => {
                localStorage.removeItem('kilimo_token');
            });
        }
    </script>
</body>
</html>
